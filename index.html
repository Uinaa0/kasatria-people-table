<!-- ============================================================
  SETUP CHECKLIST (see README.md for full walkthrough)
  1. Create an OAuth 2.0 Client ID in Google Cloud Console
     -> paste it into CONFIG.GOOGLE_CLIENT_ID below.
  2. Publish your Google Sheet to the web as CSV
     (File > Share > Publish to web > CSV)

     static host) and add that exact URL as an Authorized JavaScript

  can preview the visualization immediately.

<!-- ============== LOGIN SCREEN ============== -->
<div id="login-screen">

    <div id="demo-note">No OAuth Client ID configured yet?</div>

</div>

<!-- ============== APP ============== -->
<div id="app">
  <div id="container"></div>

  <div id="topbar">
    <div id="brand">Kasatria <b>People Table</b></div>
    <div id="userbox">

      <img id="user-avatar" alt="" />

  <div id="status">Loading data…</div>

    <button data-layout="sphere">SPHERE</button>
    <button data-layout="helix">HELIX</button>
    <button data-layout="grid">GRID</button>
  </div>
</div>

function isConfigured(value, placeholderMarker) {
  return value && !value.includes(placeholderMarker);
}

function initGoogleSignIn() {
  if (!isConfigured(CONFIG.GOOGLE_CLIENT_ID, "YOUR_GOOGLE_OAUTH_CLIENT_ID")) {
    document.getElementById("demo-note").textContent =
      "GOOGLE_CLIENT_ID isn't set — use demo mode below, or add your Client ID in index.html.";
    return;
  }
  google.accounts.id.initialize({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    callback: handleGoogleSignIn
  });
  google.accounts.id.renderButton(
    document.getElementById("gsi-button"),
    { theme: "filled_black", size: "large", shape: "pill", width: 280 }
  );
  google.accounts.id.prompt(); // optional One Tap
}

function decodeJwt(token) {
  const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
  const json = decodeURIComponent(
    atob(base64).split("").map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join("")
  );
  return JSON.parse(json);
}

let currentUser = null;

function handleGoogleSignIn(response) {
  currentUser = decodeJwt(response.credential);
  enterApp();
}

function enterApp() {
  document.getElementById("login-screen").style.display = "none";
  const app = document.getElementById("app");
  app.classList.add("visible");

  if (currentUser) {
    document.getElementById("user-name").textContent = currentUser.name || currentUser.email || "";
    if (currentUser.picture) document.getElementById("user-avatar").src = currentUser.picture;
  } else {
    document.getElementById("user-name").textContent = "Demo mode";
    document.getElementById("user-avatar").style.display = "none";
  }

  initScene();
}

document.getElementById("demo-enter").addEventListener("click", () => {
  currentUser = null;
  enterApp();
});

document.getElementById("signout").addEventListener("click", () => {
  if (window.google && google.accounts && google.accounts.id) {
    google.accounts.id.disableAutoSelect();
  }
  location.reload();
});

window.addEventListener("load", () => {
  // google script is async; poll briefly until it's ready
  const tryInit = () => {
    if (window.google && google.accounts && google.accounts.id) initGoogleSignIn();
    else setTimeout(tryInit, 150);
  };
  tryInit();
});

/* =========================================================
   2. DATA LOADING (Google Sheet published as CSV)
========================================================= */
async function loadData() {
  if (isConfigured(CONFIG.SHEET_CSV_URL, "YOUR_PUBLISHED_GOOGLE_SHEET_CSV_URL")) {
    try {
      const res = await fetch(CONFIG.SHEET_CSV_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
      if (parsed.data && parsed.data.length) {
        setStatus("Loaded " + parsed.data.length + " rows from Google Sheet");
        return normalizeRows(parsed.data);
      }
    } catch (e) {
      console.warn("Sheet fetch failed, falling back to embedded data:", e);
    }
  }
  setStatus("Using embedded demo data (" + EMBEDDED_DATA.length + " rows)");
  return normalizeRows(EMBEDDED_DATA);
}

function normalizeRows(rows) {
  return rows
    .filter(r => r.Name && r.Name.trim())
    .map(r => ({
      name: (r.Name || "").trim(),
      photo: (r.Photo || "").trim(),
      age: (r.Age || "").trim(),
      country: (r.Country || "").trim(),
      interest: (r.Interest || "").trim(),
      netWorth: parseCurrency(r["Net Worth"] || r["Net Worth "] || "0")
    }));
}

function parseCurrency(str) {
  const n = parseFloat(String(str).replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? 0 : n;
}

function setStatus(msg) {
  const el = document.getElementById("status");
  if (el) el.textContent = msg;
}

/* =========================================================
   3. THREE.JS CSS3D SCENE
========================================================= */
let camera, scene, renderer, controls;
let objects = [];
let targets = { table: [], sphere: [], helix: [], grid: [] };

async function initScene() {
  const container = document.getElementById("container");

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
  camera.position.set(400, 300, 2200);

  scene = new THREE.Scene();

  renderer = new THREE.CSS3DRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.minDistance = 500;
  controls.maxDistance = 6000;
  controls.enablePan = true;

  const records = await loadData();
  buildObjects(records);
  computeTargets(records.length);
  transform(targets.table, 1400);

  window.addEventListener("resize", onWindowResize);
  animate();

  document.querySelectorAll("#menu button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#menu button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      transform(targets[btn.dataset.layout], 1400);
    });
  });
}

function initials(name) {
  return name.split(" ").filter(Boolean).slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

function buildObjects(records) {
  records.forEach((r) => {
    const div = document.createElement("div");
    const cls = r.netWorth < 100000 ? "nw-red" : (r.netWorth < 200000 ? "nw-orange" : "nw-green");
    div.className = "tile " + cls;

    const top = document.createElement("div");
    top.className = "tile-top";
    top.innerHTML = `<span>${r.country || "--"}</span><span>${r.age || "--"}</span>`;
    div.appendChild(top);

    const photoWrap = document.createElement("div");
    photoWrap.className = "tile-photo";
    photoWrap.setAttribute("data-initials", initials(r.name || "?"));
    if (r.photo) {
      const img = document.createElement("img");
      img.src = r.photo;
      img.loading = "lazy";
      img.onerror = () => { photoWrap.classList.add("no-photo"); img.remove(); };
      photoWrap.appendChild(img);
    } else {
      photoWrap.classList.add("no-photo");
    }
    div.appendChild(photoWrap);

    const name = document.createElement("div");
    name.className = "tile-name";
    name.textContent = r.name;
    div.appendChild(name);

    const interest = document.createElement("div");
    interest.className = "tile-interest";
    interest.textContent = r.interest;
    div.appendChild(interest);

    const worth = document.createElement("div");
    worth.className = "tile-worth";
    worth.textContent = "$" + Math.round(r.netWorth).toLocaleString();
    div.appendChild(worth);

    const object = new THREE.CSS3DObject(div);
    object.position.set(
      (Math.random() - 0.5) * 4000,
      (Math.random() - 0.5) * 4000,
      (Math.random() - 0.5) * 4000
    );
    scene.add(object);
    objects.push(object);
  });
}

function computeTargets(count) {
  targets.table = buildTableTargets(count);
  targets.sphere = buildSphereTargets(count);
  targets.helix = buildDoubleHelixTargets(count);
  targets.grid = buildGridTargets(count);
}

// ---- TABLE: 20 columns x 10 rows ----
function buildTableTargets(count) {
  const COLS = 20, ROWS = 10;
  const spacingX = 150, spacingY = 190;
  const out = [];
  for (let i = 0; i < count; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const object = new THREE.Object3D();
    object.position.x = col * spacingX - (COLS * spacingX) / 2 + spacingX / 2;
    object.position.y = -(row * spacingY) + (ROWS * spacingY) / 2 - spacingY / 2;
    object.position.z = 0;
    out.push(object);
  }
  return out;
}

// ---- SPHERE: even Fibonacci-sphere distribution ----
function buildSphereTargets(count) {
  const radius = 950;
  const out = [];
  for (let i = 0; i < count; i++) {
    const phi = Math.acos(1 - (2 * (i + 0.5)) / count);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);

    const object = new THREE.Object3D();
    object.position.x = radius * Math.cos(theta) * Math.sin(phi);
    object.position.y = radius * Math.sin(theta) * Math.sin(phi);
    object.position.z = radius * Math.cos(phi);

    const lookTarget = object.position.clone().multiplyScalar(2);
    object.lookAt(lookTarget);
    out.push(object);
  }
  return out;
}

// ---- DOUBLE HELIX: two strands offset by 180 degrees ----
function buildDoubleHelixTargets(count) {
  const radius = 950;
  const verticalSpacing = 16;
  const angleStep = 0.42;
  const out = [];
  for (let i = 0; i < count; i++) {
    const strand = i % 2;                 // 0 = strand A, 1 = strand B
    const strandIndex = Math.floor(i / 2);
    const angle = strandIndex * angleStep + (strand * Math.PI); // 180deg offset
    const y = -(strandIndex * verticalSpacing) + (count / 2) * (verticalSpacing / 2);

    const object = new THREE.Object3D();
    object.position.x = radius * Math.sin(angle);
    object.position.y = y;
    object.position.z = radius * Math.cos(angle);

    const lookTarget = new THREE.Vector3(object.position.x * 2, object.position.y, object.position.z * 2);
    object.lookAt(lookTarget);
    out.push(object);
  }
  return out;
}

// ---- GRID: 5 x 4 x 10 ----
function buildGridTargets(count) {
  const GX = 5, GY = 4, GZ = 10; // 5*4*10 = 200
  const spacing = 190;
  const out = [];
  for (let i = 0; i < count; i++) {
    const x = i % GX;
    const y = Math.floor(i / GX) % GY;
    const z = Math.floor(i / (GX * GY));

    const object = new THREE.Object3D();
    object.position.x = x * spacing - ((GX - 1) * spacing) / 2;
    object.position.y = -(y * spacing) + ((GY - 1) * spacing) / 2;
    object.position.z = z * spacing - ((GZ - 1) * spacing) / 2;
    out.push(object);
  }
  return out;
}

// ---- animate between current object transforms and a target set ----
function transform(targetSet, duration) {
  TWEEN.removeAll();
  for (let i = 0; i < objects.length; i++) {
    const object = objects[i];
    const target = targetSet[i];
    if (!target) continue;

    new TWEEN.Tween(object.position)
      .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();

    new TWEEN.Tween(object.rotation)
      .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();
  }
  new TWEEN.Tween({}).to({}, duration * 2).onUpdate(render).start();
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  render();
}

function animate(time) {
  requestAnimationFrame(animate);
  TWEEN.update(time);
  controls.update();
  render();
}

function render() {
  renderer.render(scene, camera);
}
</script>
